schema: spec-driven

# =============================================================================
# DragBuilder OpenSpec 配置文件
# =============================================================================
# 本文件专门用于约束 OpenSpec 需求工作流 (Proposal -> Specs -> Design -> Tasks)。
# 代码实现层的具体约束，请参考项目根目录的 CLAUDE.md。
# =============================================================================

context: |
  # 项目总览 (Project Overview)
  本项目为 DragBuilder (全栈可视化拖拽页面构建器)。

  # ⚠️ 核心前置依赖 (Critical Dependency)
  关于本项目的具体技术栈 (React 19, NestJS 11 等)、代码规范、文件命名、目录结构、测试自检命令以及 **Git 工作流规范**，已统一收拢于项目根目录的 `CLAUDE.md`。

  **最高指令**：在执行任何规划、编码或提交任务前，你必须**优先且严格遵守 `CLAUDE.md`** 中的所有纪律要求。

  # OpenSpec 工作流纪律 (Workflow Discipline)
  - 在需求未通过 Proposal -> Specs -> Design -> Tasks 完整流程并得到确认前，严禁直接修改或生成任何业务代码。
  - 在生成对应的规划文档制品时，必须严格遵守下方的 `rules`。

# ---------------------------------------------------------------------------
# Per-Artifact 规则 (Per-Artifact Rules)
# ---------------------------------------------------------------------------
rules:

  proposal:
    - 提案内容控制在 800 词以内
    - 必须包含"Non-goals"（非目标）章节
    - 必须包含"Capabilities"（能力）章节，区分 New/Modified
    - 必须包含"Impact"（影响）章节，说明前端/后端/数据库变更
    - 所有描述使用中文

  specs:
    - 使用 Gherkin 风格需求描述 (Requirement: ... / Scenario: ... / WHEN ... AND ... THEN ...)
    - 所有需求必须可追溯到某个 capability
    - 所有描述使用中文

  design:
    - 包含 Architecture 章节，描述组件架构图
    - 包含 Data Model 章节，说明类型变更
    - 如涉及后端变更，必须包含 API contract 章节
    - 所有描述使用中文

  tasks:
    - 任务拆分为带 [ ] 复选框的可执行项
    - 已完成项标记为[x]
    - 每个任务必须可独立测试
    - 包含验证步骤 (npm run lint, npm run test 等)
    - 相关子任务按编号分组
    - 所有描述使用中文
